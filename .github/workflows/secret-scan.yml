name: Secret Scan

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan working tree
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.28.0 detect --source=/repo --no-git --config=/repo/gitleaks.toml --redact --verbose
