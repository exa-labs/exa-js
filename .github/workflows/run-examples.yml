name: Test SDK and Run Examples

on:
  workflow_call:
    secrets:
      EXA_API_KEY:
        required: true
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test-sdk-and-run-examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

      - name: Run Node.js example
        working-directory: ./examples/node
        run: |
          npm ci
          npm run build
          node dist/server.js &
          sleep 10
          curl -s -o /tmp/curl_output.txt http://localhost:8000 || cat /tmp/curl_output.txt
          kill %1
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

    # Optional: Add steps to publish the package if on main branch
    # - name: Publish to npm
    #   if: github.ref == 'refs/heads/main'
    #   run: npm run publish:stable
    #   env:
    #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  run-typescript-examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Compile TypeScript files
        run: |
          cd examples
          tsc -p tsconfig.json --noEmit

      - name: Run TypeScript files
        run: |
          for file in examples/*.ts; do
            if [ "$file" = "examples/chat_completion.ts" ] || [ "$file" = "examples/openai_responses.ts" ] || [ "$file" = "examples/zod_summary_example.ts" ]; then
              echo "Skipping $file"
              continue
            fi
            echo "Running $file"
            npx tsx $file || echo "Failed to run $file"
          done
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
